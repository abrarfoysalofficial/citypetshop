# ─────────────────────────────────────────────────────────────────────────────
# OpenLiteSpeed vHost Config — City Plus Pet Shop
# File location on server:
#   /usr/local/lsws/conf/vhosts/citypluspetshop.com/vhconf.conf
#
# HOW TO APPLY:
#   1. Copy this file to the path above (see §APPLY below)
#   2. sudo systemctl restart lsws
#   3. sudo tail -20 /usr/local/lsws/logs/error.log
#
# This config:
#   - Serves /_next/static/ directly from disk (no proxy, max cache)
#   - Serves /uploads/ directly from disk
#   - Proxies all other requests to Node.js on 127.0.0.1:3001
#   - Supports WebSocket (required for Next.js HMR and live features)
# ─────────────────────────────────────────────────────────────────────────────

extprocessor lsapi:cityplus_next {
  type                    proxy
  address                 127.0.0.1:3001
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  checkInterval           0
  respBuffer              0
  extraHeaders            "X-Forwarded-Proto: https\nX-Forwarded-For: $REMOTE_ADDR"
}

context /_next/static/ {
  location                /var/www/cityplus/app/.next/static/
  allowBrowse             0
  addDefaultCharset       off
  extraHeaders            "Cache-Control: public, max-age=31536000, immutable"
}

context /uploads/ {
  location                /var/www/cityplus/uploads/
  allowBrowse             0
  addDefaultCharset       off
}

context / {
  type                    proxy
  handler                 lsapi:cityplus_next
  addDefaultCharset       off
}
