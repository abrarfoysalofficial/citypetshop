# ─────────────────────────────────────────────────────────────────────────────
# sudoers config for City Plus Pet Shop deploy users
# Install: sudo cp deploy/sudoers-cityplus.conf /etc/sudoers.d/cityplus
#          sudo chmod 440 /etc/sudoers.d/cityplus
#          sudo visudo -c -f /etc/sudoers.d/cityplus
#
# PRINCIPLE OF LEAST PRIVILEGE:
#   - cityplus can only run pg_dump (for pre-deploy backup)
#   - cityplus_staging can only run pg_dump on staging DB
#   - No NOPASSWD: ALL is used
#   - No shell escapes
#   - Exact command paths only
# ─────────────────────────────────────────────────────────────────────────────

# Production: backup only
cityplus ALL=(postgres) NOPASSWD: /usr/bin/pg_dump -Fc -d cityplus_db -f /var/backups/cityplus/*.dump

# Staging: backup only
cityplus_staging ALL=(postgres) NOPASSWD: /usr/bin/pg_dump -Fc -d cityplus_staging -f /var/backups/cityplus-staging/*.dump
